<!DOCTYPE html>
<html>
<head>
    <title>Latihan Class dan ID CSS</title>

    <style>
        .kuning {
            background-color: yellow;
        }

        .hijau {
            background-color: lightgreen;
        }

        .biru {
            background-color: lightblue;
        }

        #judul {
            font-size: 30px;
            text-align: center;
        }
    </style>
</head>

<body>
    <h1 id="judul">Latihan CSS Class dan ID</h1>

    <p class="kuning">
        Ini adalah paragraf dengan latar belakang kuning.
    </p>

    <p class="hijau">
        Ini adalah paragraf dengan latar belakang hijau.
    </p>

    <p class="biru">
        Ini adalah paragraf dengan latar belakang biru.
    </p>
</body>
</html>
