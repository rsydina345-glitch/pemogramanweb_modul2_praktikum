<!DOCTYPE html>
<html>
<head>
    <title>Latihan Format Teks CSS</title>

    <style>
        h1 {
            font-family: "Times New Roman", serif;
            font-size: 42px;
            font-weight: bold;
            text-align: center;
        }

        p {
            text-align: right;
            text-decoration: underline;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <h1>Selamat Datang di Praktikum CSS</h1>

    <p>
        Ini adalah paragraf dengan teks rata kanan dan diberi garis bawah.
    </p>
</body>
</html>
