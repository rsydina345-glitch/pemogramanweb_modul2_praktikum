<!DOCTYPE html>
<html>
<head>
    <title>Latihan Flexbox</title>

    <style>
        .container {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            height: 200px;
        }

        .item {
            background-color: lightblue;
            padding: 20px;
            border: 1px solid black;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item">Item 1</div>
        <div class="item">Item 2</div>
        <div class="item">Item 3</div>
    </div>
</body>
</html>
